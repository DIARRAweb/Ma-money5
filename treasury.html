<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trésorerie</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>💰 Trésorerie Admin</h1>
</header>

<main>
<section class="dashboard-box">

<h2 id="balance"></h2>

<label>Taux (%)</label>
<input id="rate" type="number">

<button onclick="updateRate()">Modifier</button>
<button onclick="sendFees()">Envoyer frais à Admin</button>
<button onclick="goBack()">Retour</button>

</section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxBRBCJJL8ljgpL5vIYzvkMQn-1Mlreq8",
    authDomain: "ma-money4.firebaseapp.com",
    projectId: "ma-money4",
    storageBucket: "ma-money4.firebasestorage.app",
    messagingSenderId: "480800291334",
    appId: "1:480800291334:web:1885805730703d42456187"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function load(){
const snap = await get(ref(db,"treasury"));
let t = snap.val() || { balance:0, rate:0.01 };
balance.innerText = "Solde : " + t.balance + " FCFA";
rate.value = t.rate * 100;
}
load();

window.updateRate = async function(){
let r = parseFloat(rate.value);
await update(ref(db,"treasury"), { rate: r/100 });
alert("Taux modifié !");
};

window.sendFees = async function(){
const treasurySnap = await get(ref(db,"treasury"));
const adminSnap = await get(ref(db,"users/99999999"));

let t = treasurySnap.val();
let admin = adminSnap.val();

admin.solde += t.balance;
t.balance = 0;

await update(ref(db,"users/99999999"), admin);
await update(ref(db,"treasury"), t);

alert("Frais transférés !");
load();
};

window.goBack = function(){
window.location.href = "admin.html";
};
</script>

</body>
</html>
